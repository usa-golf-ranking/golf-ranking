<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

<title>US Course Rankings</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f0;color:#1a1a1a;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER - light mode */
#header{background:#2D5016;border-bottom:2px solid #c9a84c;padding:12px 24px;flex-shrink:0;display:flex;align-items:center;gap:16px}
#header h1{font-size:22px;color:#f0e8d0;letter-spacing:1px;font-weight:700}

/* MAIN SPLIT */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* MAP PANEL */
#map-panel{flex:1;display:flex;flex-direction:column;min-width:0;border-right:2px solid #c9a84c}
#map{flex:1;min-height:0}

.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* RIGHT PANEL */
#right-panel{width:460px;flex-shrink:0;display:flex;flex-direction:column;background:#f5f5f0;overflow:hidden;position:relative}

/* CONTROLS - 2 rows, full width of right panel */
#controls{background:#e8e4dc;border-bottom:2px solid #c9a84c;padding:8px 12px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.ctrl-row{display:flex;gap:8px;align-items:center}
#controls select{padding:5px 10px;background:#fff;border:1px solid #bbb;border-radius:4px;color:#1a1a1a;font-size:12px;font-family:'Inter',sans-serif;outline:none}
#top-sel{flex:1}
#clear-btn{padding:5px 10px;background:#f0e8d0;border:1px solid #c9a84c44;border-radius:4px;color:#c9a84c88;cursor:default;font-size:12px;font-family:'Inter',sans-serif;pointer-events:none;transition:color .15s,border-color .15s,background .15s;white-space:nowrap}
#count{font-size:11px;color:#888;white-space:nowrap;margin-left:2px}

/* State dropdown */
#state-wrap{position:relative;flex:1}
#state-search{padding:5px 24px 5px 10px;background:#fff;border:1px solid #bbb;border-radius:4px;color:#1a1a1a;font-size:12px;font-family:'Inter',sans-serif;outline:none;width:100%;cursor:pointer}
#state-search::placeholder{color:#999}
#state-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);color:#999;pointer-events:none;font-size:10px}
#state-dropdown{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;min-width:190px;background:#fff;border:1px solid #bbb;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:9999;max-height:260px;overflow-y:auto}
#state-dropdown.open{display:block}
#state-filter-input{width:100%;padding:6px 10px;background:#f5f5f5;border:none;border-bottom:1px solid #ddd;color:#1a1a1a;font-size:12px;font-family:'Inter',sans-serif;outline:none}
#state-filter-input::placeholder{color:#aaa}
.state-opt{padding:6px 10px;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;color:#1a1a1a;display:flex;align-items:center;gap:7px}
.state-opt:hover{background:#f0f0e8}
.state-opt.selected{color:#2a6a2a;background:#f0f5f0}
.state-check{width:14px;height:14px;flex-shrink:0;border:1.5px solid #bbb;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#2a6a2a;background:#fff}
.state-opt.selected .state-check{background:#e0f0e0;border-color:#2a6a2a}
#state-dropdown::-webkit-scrollbar{width:4px}
#state-dropdown::-webkit-scrollbar-track{background:#f5f5f5}
#state-dropdown::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

/* Price slider */
#price-wrap{display:flex;align-items:center;gap:7px;flex:1}
#price-wrap label{font-size:11px;color:#666;white-space:nowrap}
#price-range{-webkit-appearance:none;appearance:none;flex:1;height:4px;background:#ccc;border-radius:2px;outline:none;cursor:pointer}
#price-range::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#c9a84c;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
#price-range::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#c9a84c;cursor:pointer;border:2px solid #fff}
#price-val{font-size:12px;color:#8a6a1a;font-family:'Inter',sans-serif;width:72px;display:inline-block;font-weight:600}

/* COLUMN HEADERS */
#col-headers{display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid #ddd;background:#ece9e2;flex-shrink:0}
.ch{font-size:9px;color:#888;letter-spacing:1px;text-transform:uppercase}
.ch-rank{width:46px;flex-shrink:0}.ch-name{flex:1}.ch-price{width:54px;text-align:right;flex-shrink:0;padding-right:4px}.ch-sr{width:68px;text-align:center;flex-shrink:0}

/* LIST */
#list{flex:1;overflow-y:auto;padding-bottom:48px;background:#fff}
#list::-webkit-scrollbar{width:5px}
#list::-webkit-scrollbar-track{background:#f5f5f0}
#list::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.row{display:flex;align-items:center;padding:7px 12px;border-bottom:1px solid #d0d0c8;cursor:pointer;transition:background .1s}
.row:hover{background:#f5f0e8!important}
.row.top10{background:#fdf8ec}.row.top25{background:#fafaf8}.row.top50{background:#fdf6f2}.row.top100{background:#f5faf5}
.r-rank{width:46px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;flex-shrink:0}
.r-info{flex:1;min-width:0}
.r-name{font-size:14px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-loc{font-size:11px;color:#888;margin-top:1px}
.r-price{width:54px;text-align:right;padding-right:4px;flex-shrink:0;font-family:'Inter',sans-serif;font-size:12px}
.r-sr{width:68px;text-align:center;flex-shrink:0}
.r-sr-num{font-family:'Inter',sans-serif;font-size:13px;font-weight:600}
.r-sr-of{font-size:10px;color:#aaa}

/* PAGINATION */
#pagination{position:absolute;bottom:0;left:0;right:0;background:#ece9e2;border-top:1px solid #ddd;padding:7px 12px;display:flex;justify-content:center;align-items:center;gap:10px}
#pagination button{padding:4px 14px;background:#fff;border:1px solid #bbb;border-radius:4px;color:#2a6a2a;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif}
#pagination button:disabled{color:#ccc;border-color:#ddd;cursor:default}
#pagination span{color:#888;font-size:11px}

/* Leaflet tooltip - light */
.leaflet-tooltip{font-family:'Inter',sans-serif;font-size:12px;background:#fff;border:1px solid #ccc;color:#1a1a1a;box-shadow:0 2px 6px rgba(0,0,0,.15);max-width:280px}
</style>
</head>
<body>

<div id="header">
  <h1>US Course Rankings</h1>
</div>

<div id="main">
  <div id="map-panel">
    <div id="map"></div>

  </div>

  <div id="right-panel">
    <!-- CONTROLS: 2 rows above list -->
    <div id="controls">
      <div class="ctrl-row" id="legend" style="gap:14px;padding-bottom:2px;border-bottom:1px solid #ddd;margin-bottom:2px">
        <div class="leg-item"><div class="leg-dot" style="background:#b8860b"></div><span id="leg1">Top 10</span></div>
        <div class="leg-item"><div class="leg-dot" style="background:#888"></div><span id="leg2">Top 25</span></div>
        <div class="leg-item"><div class="leg-dot" style="background:#8B4513"></div><span id="leg3">Top 50</span></div>
        <div class="leg-item"><div class="leg-dot" style="background:#2e7d50"></div><span id="leg4">Top 100</span></div>
        <div class="leg-item"><div class="leg-dot" style="background:#2a5a8a"></div><span id="leg5">101+</span></div>
      </div>

      <div class="ctrl-row">
        <select id="top-sel" onchange="onTopChange()">
          <option value="">All Rankings</option>
          <option value="10">Top 10</option>
          <option value="25">Top 25</option>
          <option value="50">Top 50</option>
          <option value="100">Top 100</option>
          <option value="150">Top 150</option>
          <option value="200">Top 200</option>
          <option value="250">Top 250</option>
          <option value="300">Top 300</option>
          <option value="400">Top 400</option>
          <option value="500">Top 500</option>
        </select>
        <div id="state-wrap">
          <input id="state-search" placeholder="All States ▾" readonly onclick="toggleStateDD()" autocomplete="off">
          <span id="state-arrow">▾</span>
          <div id="state-dropdown">
            <input id="state-filter-input" placeholder="Type to search states..." oninput="filterStateList()" autocomplete="off">
            <div id="state-opts"></div>
          </div>
        </div>
        <button id="clear-btn" onclick="clearFilters()">✕ Clear</button>
        <span id="count"></span>
      </div>
      <div class="ctrl-row">
        <div id="price-wrap">
          <label>Max fee:</label>
          <input type="range" id="price-range" min="0" max="650" step="25" value="650" oninput="onPriceChange()">
          <span id="price-val">Any</span>
        </div>
      </div>
    </div>

    <div id="col-headers">
      <div class="ch ch-rank">Rank</div>
      <div class="ch ch-name">Course</div>
      <div class="ch ch-price">Fee</div>
      <div class="ch ch-sr">State</div>
    </div>
    <div id="list"></div>
    <div id="pagination">
      <button id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
      <span id="page-info"></span>
      <button id="next-btn" onclick="changePage(1)">Next →</button>
    </div>
  </div>
</div>

const STATE_NAMES = {
  AK:'Alaska',AL:'Alabama',AR:'Arkansas',AZ:'Arizona',CA:'California',
  CO:'Colorado',CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',
  HI:'Hawaii',IA:'Iowa',ID:'Idaho',IL:'Illinois',IN:'Indiana',
  KS:'Kansas',KY:'Kentucky',LA:'Louisiana',MA:'Massachusetts',MD:'Maryland',
  ME:'Maine',MI:'Michigan',MN:'Minnesota',MO:'Missouri',MS:'Mississippi',
  MT:'Montana',NC:'North Carolina',ND:'North Dakota',NE:'Nebraska',NH:'New Hampshire',
  NJ:'New Jersey',NM:'New Mexico',NV:'Nevada',NY:'New York',OH:'Ohio',
  OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',
  SD:'South Dakota',TN:'Tennessee',TX:'Texas',UT:'Utah',VA:'Virginia',
  VT:'Vermont',WA:'Washington',WI:'Wisconsin',WV:'West Virginia',WY:'Wyoming'
};

const PER_PAGE = 50;
let filtered = [...COURSES];
let page = 1;
let activeStates = new Set();
let topFilter = 0;
let priceFilter = 0;
let markerRefs = [];

// ── State dropdown ────────────────────────────────────────────────────────────
const allStates = [...new Set(COURSES.map(c=>c[3]))].sort();
const stateOptsEl = document.getElementById('state-opts');

function buildStateOpts(filter='') {
  const fl = filter.toLowerCase();
  const allOpts = [{code:'',name:'All States'}, ...allStates.map(s=>({code:s,name:STATE_NAMES[s]||s}))];
  const filtered = allOpts.filter(o=>!fl||o.name.toLowerCase().includes(fl)||o.code.toLowerCase().includes(fl));
  // Separate: "All States" always first, then checked states, then unchecked
  const allStatesOpt = filtered.filter(o=>o.code==='');
  const checked = filtered.filter(o=>o.code!==''&&activeStates.has(o.code));
  const unchecked = filtered.filter(o=>o.code!==''&&!activeStates.has(o.code));
  const sorted = [...allStatesOpt, ...checked, ...unchecked];
  stateOptsEl.innerHTML = sorted.map(o=>{
    const sel = o.code===''?activeStates.size===0:activeStates.has(o.code);
    const divider = o.code===checked[0]?.code&&checked.length>0 ? ' style="border-top:2px solid #c9a84c44"' : '';
    return `<div class="state-opt${sel?' selected':''}"${divider} onclick="toggleState('${o.code}')"><div class="state-check">${sel?'✓':''}</div>${o.name||'All States'}</div>`;
  }).join('');
}
buildStateOpts();

function toggleStateDD(){
  const dd=document.getElementById('state-dropdown');
  if(dd.classList.toggle('open')){
    document.getElementById('state-filter-input').value='';
    buildStateOpts();
    setTimeout(()=>document.getElementById('state-filter-input').focus(),50);
  }
}
function filterStateList(){ buildStateOpts(document.getElementById('state-filter-input').value); }
function toggleState(code){
  if(code==='') activeStates.clear();
  else if(activeStates.has(code)) activeStates.delete(code);
  else activeStates.add(code);
  buildStateOpts(document.getElementById('state-filter-input').value);
  updateStateLabel(); updateClearBtn(); applyFilters();
}
function updateStateLabel(){
  const inp=document.getElementById('state-search');
  if(activeStates.size===0){ inp.value=''; inp.placeholder='All States ▾'; }
  else if(activeStates.size===1){ inp.value=STATE_NAMES[[...activeStates][0]]||[...activeStates][0]; }
  else { inp.value=`${activeStates.size} states selected`; }
}
document.addEventListener('click',e=>{
  if(!document.getElementById('state-wrap').contains(e.target))
    document.getElementById('state-dropdown').classList.remove('open');
});

// ── Colours ──────────────────────────────────────────────────────────────────
function overallColor(r){ return r<=10?{bg:'#b8860b',text:'#fff'}:r<=25?{bg:'#555',text:'#fff'}:r<=50?{bg:'#8B4513',text:'#fff'}:r<=100?{bg:'#2e7d50',text:'#fff'}:{bg:'#2a5a8a',text:'#fff'}; }
function stateColor(sr){ return sr===1?{bg:'#b8860b',text:'#fff'}:sr<=3?{bg:'#555',text:'#fff'}:sr<=5?{bg:'#8B4513',text:'#fff'}:sr<=10?{bg:'#2e7d50',text:'#fff'}:{bg:'#2a5a8a',text:'#fff'}; }
function listColor(r){ return r<=10?'#8a6a00':r<=25?'#444':r<=50?'#7a3010':r<=100?'#1a6040':'#1a3a6a'; }
function rankClass(r){ return r<=10?'top10':r<=25?'top25':r<=50?'top50':r<=100?'top100':''; }
function srColor(sr){ return sr===1?'#8a6a00':sr<=3?'#555':'#888'; }
function priceColor(p){ return p>=400?'#8B4513':p>=250?'#555':p>=150?'#1a6040':'#1a3a6a'; }

// ── Dot sizing ────────────────────────────────────────────────────────────────
function dotBase(rank,sr,lbl,stm){
  if(stm){ return sr===1?26:sr<=3?22:sr<=5?18:sr<=10?15:12; }
  if(lbl){ return rank<=10?26:rank<=25?22:rank<=50?18:rank<=100?15:12; }
  return rank<=10?16:rank<=50?12:rank<=100?10:8;
}
function dotSz(rank,sr,zoom,lbl,stm){ return dotBase(rank,sr,lbl,stm)+Math.max(0,zoom-4)*2; }

function makeIcon(rank,sr,zoom,showLabel,labelNum,stateMode){
  const sz=dotSz(rank,sr,zoom,showLabel,stateMode);
  const col=stateMode?stateColor(sr):overallColor(rank);
  // thinner border: 1px only
  const label=(showLabel&&sz>=12)
    ?`<span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:${Math.max(7,Math.round(sz*0.42))}px;font-weight:900;color:${col.text};line-height:1;pointer-events:none">${labelNum}</span>`:'';
  return L.divIcon({
    className:'',
    html:`<div style="position:relative;width:${sz}px;height:${sz}px;border-radius:50%;background:${col.bg};border:1px solid rgba(255,255,255,.5);box-shadow:0 1px 3px rgba(0,0,0,.35);cursor:pointer">${label}</div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],tooltipAnchor:[0,-sz/2]
  });
}

// ── Map ───────────────────────────────────────────────────────────────────────
const map=L.map('map',{center:[39,-96],zoom:4,scrollWheelZoom:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',maxZoom:19
}).addTo(map);
const markerLayer=L.layerGroup().addTo(map);

function locKey(lat,lon){ return `${lat.toFixed(3)},${lon.toFixed(3)}`; }

function buildMarkers(){
  const single=activeStates.size===1, showLabel=!!(activeStates.size>0||topFilter), stateMode=single, zoom=map.getZoom();
  const stacks=new Map();
  filtered.forEach(c=>{ const k=locKey(c[4],c[5]); if(!stacks.has(k))stacks.set(k,[]); stacks.get(k).push(c); });

  const refs=[];
  stacks.forEach(stack=>{
    stack.sort((a,b)=>a[0]-b[0]);
    const best=stack[0], [rank,name,city,state,lat,lon,sr,stTotal,price]=best;
    const labelNum=stateMode?sr:rank;
    const tipLines=stack.map(c=>`${stateMode?`State #${c[6]}`:`#${c[0]}`} — ${c[1]}${c[8]?' ($'+c[8]+')':''}`).join('<br>');
    const tip=stack.length>1
      ?`<b>${city}, ${state}</b><br>${tipLines}`
      :`<b>#${rank} ${name}</b><br>${city}, ${state} · State #${sr}/${stTotal}${price?` · $${price}`:''}`;

    // Higher-ranked courses (lower rank number) get higher zIndexOffset so they sit on top
    const zOff = Math.max(0, 700 - rank);

    const marker=L.marker([lat,lon],{
      icon:makeIcon(rank,sr,zoom,showLabel,labelNum,stateMode),
      riseOnHover:true,
      zIndexOffset: zOff
    });
    marker.bindTooltip(tip,{direction:'top'});
    marker.on('click',()=>toggleState(state));
    refs.push({marker,rank,sr});
  });
  return refs;
}

map.on('zoomend',()=>{
  const zoom=map.getZoom(), single=activeStates.size===1, showLabel=!!(activeStates.size>0||topFilter);
  markerRefs.forEach(({marker,rank,sr})=>{
    const lbl=single?sr:rank;
    marker.setIcon(makeIcon(rank,sr,zoom,showLabel,lbl,single));
  });
});

function updateMap(){
  markerLayer.clearLayers(); markerRefs=buildMarkers();
  markerRefs.forEach(({marker})=>markerLayer.addLayer(marker)); updateLegend();
}
function updateLegend(){
  const s=activeStates.size===1;
  ['leg1','leg2','leg3','leg4','leg5'].forEach((id,i)=>{
    document.getElementById(id).textContent=s?['#1 in state','Top 3','Top 5','Top 10','11+'][i]:['Top 10','Top 25','Top 50','Top 100','101+'][i];
  });
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters(){
  filtered=COURSES.filter(c=>{
    const mst=activeStates.size===0||activeStates.has(c[3]);
    const mtp=!topFilter||c[0]<=topFilter;
    const price=c[8];
    let mpr;
    if(priceFilter===0){ mpr=true; }
    else if(priceFilter===-1){ mpr=(price===null||price===0); }
    else { mpr=(price!==null&&price!==0&&price<=priceFilter); }
    return mst&&mtp&&mpr;
  });
  page=1; render(); updateMap();
  if(filtered.length>0&&filtered.length<COURSES.length){
    const lats=filtered.map(c=>c[4]),lons=filtered.map(c=>c[5]);
    map.fitBounds([[Math.min(...lats)-.5,Math.min(...lons)-.5],[Math.max(...lats)+.5,Math.max(...lons)+.5]],{padding:[40,40],maxZoom:12,animate:false});
  } else map.setView([39,-96],4,{animate:false});
}

function render(){
  const total=filtered.length, totalPages=Math.max(1,Math.ceil(total/PER_PAGE));
  if(page>totalPages) page=totalPages;
  const start=(page-1)*PER_PAGE, slice=filtered.slice(start,start+PER_PAGE);
  document.getElementById('count').textContent=`${total}`;
  document.getElementById('list').innerHTML=slice.map(c=>{
    const [rank,name,city,state,lat,lon,sr,stTotal,price]=c;
    const bold=rank<=50?'font-weight:600':'';
    const priceHtml=price!=null
      ?`<div class="r-price" style="color:${priceColor(price)}">$${price}</div>`
      :`<div class="r-price" style="color:#ccc">—</div>`;
    return `<div class="row ${rankClass(rank)}" onclick="zoomToRow(${lat},${lon})">
      <div class="r-rank" style="color:${listColor(rank)}">${rank}</div>
      <div class="r-info"><div class="r-name" style="${bold}" title="${name}">${name}</div><div class="r-loc">${city}, ${state}</div></div>
      ${priceHtml}
      <div class="r-sr"><div class="r-sr-num" style="color:${srColor(sr)}">#${sr}</div><div class="r-sr-of">of ${stTotal}</div></div>
    </div>`;
  }).join('');
  document.getElementById('prev-btn').disabled=page<=1;
  document.getElementById('next-btn').disabled=page>=totalPages;
  document.getElementById('page-info').textContent=`${page}/${totalPages} · #${start+1}–${Math.min(start+PER_PAGE,total)}`;
}

function zoomToRow(lat,lon){ map.setView([lat,lon],13,{animate:true}); }
function onTopChange(){ topFilter=parseInt(document.getElementById('top-sel').value)||0; updateClearBtn(); applyFilters(); }
function onPriceChange(){
  const v=parseInt(document.getElementById('price-range').value);
  if(v>=650){ priceFilter=0; document.getElementById('price-val').textContent='Any'; }
  else if(v<=0){ priceFilter=-1; document.getElementById('price-val').textContent='N/A only'; }
  else{ priceFilter=v; document.getElementById('price-val').textContent='≤$'+v; }
  updateClearBtn(); applyFilters();
}
function clearFilters(){
  activeStates.clear(); topFilter=0; priceFilter=0;
  document.getElementById('top-sel').value='';
  document.getElementById('state-search').value=''; document.getElementById('state-search').placeholder='All States ▾';
  document.getElementById('price-range').value=650; document.getElementById('price-val').textContent='Any';
  buildStateOpts(); updateClearBtn(); applyFilters();
}
function updateClearBtn(){
  const anyActive=!!(activeStates.size||topFilter||priceFilter);
  const btn=document.getElementById('clear-btn');
  btn.style.color=anyActive?'#8a6a1a':'#c9a84c44';
  btn.style.borderColor=anyActive?'#c9a84c':'#c9a84c44';
  btn.style.background=anyActive?'#f0e8d0':'transparent';
  btn.style.cursor=anyActive?'pointer':'default';
  btn.style.pointerEvents=anyActive?'auto':'none';
}
function changePage(dir){ page+=dir; render(); document.getElementById('list').scrollTop=0; }

applyFilters();
</script>
